<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barangay Admin Dashboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f6f9;
    }
    header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
    }
    .container {
        display: flex;
    }
    .sidebar {
        width: 200px;
        background: #34495e;
        color: white;
        height: 100vh;
        padding: 15px;
    }
    .sidebar a {
        display: block;
        color: white;
        padding: 10px;
        text-decoration: none;
    }
    .sidebar a:hover {
        background: #1abc9c;
    }
    .main {
        flex: 1;
        padding: 20px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }
    table, th, td {
        border: 1px solid #ddd;
    }
    th, td {
        padding: 10px;
        text-align: center;
    }
    th {
        background: #2c3e50;
        color: white;
    }
    .btn {
        padding: 5px 10px;
        border: none;
        cursor: pointer;
    }
    .approve { background: green; color: white; }
    .reject { background: red; color: white; }
    .paid { background: blue; color: white; }
</style>
</head>

<body>

<header>
    <h1>Barangay Document Request System (Admin)</h1>
</header>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Menu</h3>
        <a href="#">Dashboard</a>
        <a href="#">Requests</a>
        <a href="#">Payments</a>
        <a href="#">Issued Documents</a>
        <a href="#">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        <h2>Document Requests</h2>

        <table>
            <tr>
                <th>Name</th>
                <th>Document</th>
                <th>Status</th>
                <th>Payment</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>Juan Dela Cruz</td>
                <td>Barangay Clearance</td>
                <td>Pending</td>
                <td>Unpaid</td>
                <td>
                    <button class="btn approve">Approve</button>
                    <button class="btn reject">Reject</button>
                </td>
            </tr>

            <tr>
                <td>Maria Santos</td>
                <td>Certificate of Indigency</td>
                <td>Approved</td>
                <td>Paid</td>
                <td>
                    <button class="btn paid">Issue</button>
                </td>
            </tr>

        </table>
    </div>

</div>

</body>
  </html>
